syntax = "proto3";
option csharp_namespace = "Orleans.Journaling.Protobuf.Messages";

// A value wrapper that uses native protobuf encoding for well-known types.
// The codec selects the appropriate oneof arm at construction time based on T.
message TypedValue {
  oneof kind {
    int32 int32_value = 1;
    int64 int64_value = 2;
    uint32 uint32_value = 3;
    uint64 uint64_value = 4;
    float float_value = 5;
    double double_value = 6;
    bool bool_value = 7;
    string string_value = 8;
    bytes bytes_value = 9;
  }
}

// Dictionary entries
message DictionaryEntry {
  oneof command {
    DictionarySet set = 1;
    DictionaryRemove remove = 2;
    DictionaryClear clear = 3;
    DictionarySnapshot snapshot = 4;
  }
}

message DictionarySet {
  TypedValue key = 1;
  TypedValue value = 2;
}

message DictionaryRemove {
  TypedValue key = 1;
}

message DictionaryClear {}

message DictionarySnapshot {
  repeated DictionarySnapshotItem items = 1;
}

message DictionarySnapshotItem {
  TypedValue key = 1;
  TypedValue value = 2;
}

// List entries
message ListEntry {
  oneof command {
    ListAdd add = 1;
    ListSet set = 2;
    ListInsert insert = 3;
    ListRemoveAt remove_at = 4;
    ListClear clear = 5;
    ListSnapshot snapshot = 6;
  }
}

message ListAdd {
  TypedValue item = 1;
}

message ListSet {
  uint32 index = 1;
  TypedValue item = 2;
}

message ListInsert {
  uint32 index = 1;
  TypedValue item = 2;
}

message ListRemoveAt {
  uint32 index = 1;
}

message ListClear {}

message ListSnapshot {
  repeated TypedValue items = 1;
}

// Queue entries
message QueueEntry {
  oneof command {
    QueueEnqueue enqueue = 1;
    QueueDequeue dequeue = 2;
    QueueClear clear = 3;
    QueueSnapshot snapshot = 4;
  }
}

message QueueEnqueue {
  TypedValue item = 1;
}

message QueueDequeue {}

message QueueClear {}

message QueueSnapshot {
  repeated TypedValue items = 1;
}

// Set entries
message SetEntry {
  oneof command {
    SetAdd add = 1;
    SetRemove remove = 2;
    SetClear clear = 3;
    SetSnapshot snapshot = 4;
  }
}

message SetAdd {
  TypedValue item = 1;
}

message SetRemove {
  TypedValue item = 1;
}

message SetClear {}

message SetSnapshot {
  repeated TypedValue items = 1;
}

// Value entries
message ValueEntry {
  oneof command {
    ValueSet set = 1;
  }
}

message ValueSet {
  TypedValue value = 1;
}

// State entries
message StateEntry {
  oneof command {
    StateSet set = 1;
    StateClear clear = 2;
  }
}

message StateSet {
  TypedValue state = 1;
  uint64 version = 2;
}

message StateClear {}

// TaskCompletionSource entries
message TcsEntry {
  oneof command {
    TcsCompleted completed = 1;
    TcsFaulted faulted = 2;
    TcsCanceled canceled = 3;
    TcsPending pending = 4;
  }
}

message TcsCompleted {
  TypedValue value = 1;
}

message TcsFaulted {
  string exception = 1;
}

message TcsCanceled {}

message TcsPending {}
